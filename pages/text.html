<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn-icons-png.flaticon.com/128/9484/9484251.png"
    />
    <title>I love you</title>

    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.6rem;
        font-weight: 100;
        background-color: #111;
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2em;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <h1 id="typewriter"></h1>

    <script>
      var i = 0;
      var j = 0;
      var txt = `Hallo Bebi, 

  Ich muss mich noch für deinen Brief bedanken und möchte dir ebenfalls eine Freude bereiten :)

  Es hat mich unglaublich gefreut diese Überraschung zu erleben und bin dir sehr dankbar, dass du so eine tolle Freundin bist (man munkelt sogar, du seiest die beste🤭).

  Du liest diese Nachricht gerade auf deiner Rückfahrt von der Maturareise. 
  Ich hoffe du hattest eine tolle Zeit mit deinen Freunden 🥰.
  Die beste Zeit wirst du aber noch immer mit mir auf Urlaub haben 😘. 
 
  Du weißt nicht wie viel ich dich vermisst habe. 
  Ich sage solche Dinge nicht oft, aber dennoch solltest du wissen das sich eine Zeit ohne dich extrem einsam für mich anfühlt. 

  Ich bin so dankbar, dass es dich gibt. Dass ich jemanden gefunden habe, der mich versteht, unterstützt und mit dem ich gleichzeitig so viel lachen kann.

  Ich freue mich, dich wieder in die Arme zu nehmen. 
  Ich will dir erzählen, was ich gemacht habe, und alles über deine Reise hören. 

  Bis bald, mein Lieblingsmensch.
  Ich liebe dich. 💖

    
    `; /* Der Text */
      var speed = 70; /* Die Geschwindigkeit/Schreibverzögerung in Millisekunden */
      var lines = txt.split("\n");

      function typeWriter() {
        if (i < lines[j].length) {
          document.getElementById("typewriter").innerHTML += lines[j].charAt(i);
          i++;
          window.scrollTo(0, document.body.scrollHeight);
          setTimeout(typeWriter, speed);
        } else if (j < lines.length - 1) {
          document.getElementById("typewriter").innerHTML += "<br>";
          i = 0;
          j++;
          window.scrollTo(0, document.body.scrollHeight);
          setTimeout(typeWriter, speed);
        }
      }

      typeWriter();
    </script>
  </body>
</html>
