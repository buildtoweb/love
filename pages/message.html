<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/9484/9484251.png" />
    <title>Nachricht 💌</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }

      @keyframes blob {
        0%   { transform: translate(0,0) scale(1); }
        33%  { transform: translate(24px,-38px) scale(1.07); }
        66%  { transform: translate(-16px,16px) scale(0.95); }
        100% { transform: translate(0,0) scale(1); }
      }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      .blob { animation: blob 9s ease-in-out infinite; }
      .d2   { animation-delay: 2.5s; }
      .d4   { animation-delay: 5s; }
      .fade-in { animation: fadeIn 0.5s ease-out both; }

      .cursor {
        display: inline-block;
        width: 2px; height: 1.1em;
        background: #fb7185;
        border-radius: 1px;
        vertical-align: text-bottom;
        animation: blink 0.9s ease-in-out infinite;
      }

      .glass {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border: 1px solid rgba(255,255,255,0.09);
      }

      #typewriter {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(1.05rem, 2.2vw, 1.25rem);
        line-height: 1.9;
        font-weight: 400;
        white-space: pre-line;
        color: rgba(255,255,255,0.82);
      }

      .back-btn {
        background: rgba(255,255,255,0.065);
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
      }
      .back-btn:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-1px);
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#05030a] text-white relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
      <div class="blob    absolute -top-44 -right-28 w-96 h-96 rounded-full opacity-[0.11]"
           style="background:radial-gradient(circle,#be185d,transparent 66%);"></div>
      <div class="blob d2 absolute -bottom-32 -left-32 w-80 h-80 rounded-full opacity-[0.09]"
           style="background:radial-gradient(circle,#4338ca,transparent 66%);"></div>
      <div class="blob d4 absolute top-1/3 left-1/4 w-64 h-64 rounded-full opacity-[0.06]"
           style="background:radial-gradient(circle,#db2777,transparent 66%);"></div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col items-center justify-start px-4 py-12 sm:py-16">

      <!-- Back -->
      <div class="w-full max-w-2xl mb-8">
        <a href="inbox.html"
           class="back-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-white/55 text-sm hover:text-white/80">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Postfach
        </a>
      </div>

      <!-- Card -->
      <div class="glass rounded-3xl w-full max-w-2xl px-8 py-10 sm:px-12 sm:py-12 fade-in shadow-[0_24px_60px_rgba(0,0,0,0.5)]">

        <div class="flex items-start gap-3 mb-8 pb-6 border-b border-white/8">
          <span class="text-3xl mt-0.5">💌</span>
          <div>
            <h1 id="msgSubject" style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.4rem;" class="text-white leading-snug"></h1>
            <p id="msgDate" class="text-white/30 text-xs mt-1"></p>
          </div>
        </div>

        <div id="typewriter" aria-live="polite"></div>
        <span class="cursor" id="cursor"></span>
      </div>
    </div>

    <script src="messages-data.js"></script>
    <script>
      function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('de-AT', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
      }

      const params = new URLSearchParams(window.location.search);
      const id     = parseInt(params.get('id'), 10);
      const msg    = MESSAGES.find(m => m.id === id);

      if (!msg) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(255,255,255,0.4);font-family:sans-serif;">Nachricht nicht gefunden.</div>';
      } else {
        document.getElementById('msgSubject').textContent = msg.subject;
        document.getElementById('msgDate').textContent    = 'Geschrieben am ' + formatDate(msg.date);

        // Typewriter
        const tw  = document.getElementById('typewriter');
        const cur = document.getElementById('cursor');
        const lines = msg.text.split('\n');
        let i = 0, j = 0;
        const speed = 38;

        function typeWriter() {
          if (i < lines[j].length) {
            tw.innerHTML += lines[j].charAt(i++);
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(typeWriter, speed);
          } else if (j < lines.length - 1) {
            tw.innerHTML += '<br>';
            i = 0; j++;
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(typeWriter, speed);
          } else {
            cur.style.display = 'none';
          }
        }
        typeWriter();
      }
    </script>
  </body>
</html>
