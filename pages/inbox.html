<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/9484/9484251.png" />
    <title>Postfach 💌</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }

      @keyframes blob {
        0%   { transform: translate(0,0) scale(1); }
        33%  { transform: translate(24px,-38px) scale(1.07); }
        66%  { transform: translate(-16px,16px) scale(0.95); }
        100% { transform: translate(0,0) scale(1); }
      }
      @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

      .blob { animation: blob 9s ease-in-out infinite; }
      .d2   { animation-delay: 2.5s; }
      .d4   { animation-delay: 5s; }
      .fade-in { animation: fadeIn 0.5s ease-out both; }

      .glass {
        background: rgba(255,255,255,0.053);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border: 1px solid rgba(255,255,255,0.09);
      }

      .msg-row {
        background: rgba(255,255,255,0.042);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 1.1rem 1.3rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        text-decoration: none;
        transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
        cursor: pointer;
      }
      .msg-row:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(251,113,133,0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .msg-row:active { transform: translateY(0); }

      .back-btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
      }
      .back-btn:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-1px);
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#05030a] text-white relative overflow-x-hidden">

    <!-- Background blobs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
      <div class="blob    absolute -top-44 -right-28 w-96 h-96 rounded-full opacity-[0.11]"
           style="background:radial-gradient(circle,#be185d,transparent 66%);"></div>
      <div class="blob d2 absolute -bottom-32 -left-32 w-80 h-80 rounded-full opacity-[0.09]"
           style="background:radial-gradient(circle,#4338ca,transparent 66%);"></div>
      <div class="blob d4 absolute top-1/3 right-1/4 w-60 h-60 rounded-full opacity-[0.06]"
           style="background:radial-gradient(circle,#db2777,transparent 66%);"></div>
    </div>

    <div class="relative z-10 max-w-2xl mx-auto px-4 py-12 sm:py-16">

      <!-- Back -->
      <div class="mb-8">
        <a href="../dashboard.html"
           class="back-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-white/55 text-sm hover:text-white/80">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Dashboard
        </a>
      </div>

      <!-- Header -->
      <div class="text-center mb-10 fade-in">
        <div class="text-5xl mb-3">💌</div>
        <h1 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:2.4rem;" class="text-white mb-2">
          Postfach
        </h1>
        <p class="text-white/32 text-sm">Nachrichten, die nur für dich sind</p>
      </div>

      <!-- Message list -->
      <div id="messageList" class="space-y-3 fade-in" style="animation-delay:0.1s;"></div>

      <!-- Empty state (hidden by JS if messages exist) -->
      <div id="emptyState" class="hidden text-center py-16">
        <div class="text-4xl mb-4 opacity-40">📭</div>
        <p class="text-white/30 text-sm">Noch keine Nachrichten</p>
      </div>

    </div>

    <script src="messages-data.js"></script>
    <script>
      if (localStorage.getItem('love_auth') !== '1') window.location.replace('../index.html');
      function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('de-AT', { day:'numeric', month:'long', year:'numeric' });
      }

      const list = document.getElementById('messageList');
      const empty = document.getElementById('emptyState');

      if (!MESSAGES || MESSAGES.length === 0) {
        empty.classList.remove('hidden');
      } else {
        // Newest first
        const sorted = [...MESSAGES].sort((a, b) => new Date(b.date) - new Date(a.date));

        sorted.forEach((msg, i) => {
          const a = document.createElement('a');
          a.href = `message.html?id=${msg.id}`;
          a.className = 'msg-row block';
          a.style.animationDelay = `${0.12 + i * 0.07}s`;
          a.classList.add('fade-in');
          a.setAttribute('aria-label', msg.subject + ' vom ' + formatDate(msg.date));

          a.innerHTML = `
            <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-xl"
                 style="background:rgba(251,113,133,0.12);border:1px solid rgba(251,113,133,0.2);">
              💌
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-white/85 font-medium text-sm truncate">${msg.subject}</p>
              <p class="text-white/35 text-xs mt-0.5 truncate">${msg.preview}</p>
            </div>
            <div class="flex-shrink-0 text-right">
              <p class="text-white/28 text-xs whitespace-nowrap">${formatDate(msg.date)}</p>
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white/20 mt-1 ml-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </div>
          `;
          list.appendChild(a);
        });
      }
    </script>
  </body>
</html>
