<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/9484/9484251.png" />
    <title>Adventkalender 🎄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="calendar-wrapper">
      <!-- Back -->
      <a href="../../dashboard.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Dashboard
      </a>

      <!-- Header -->
      <header class="calendar-header">
        <div class="calendar-icon">🎄</div>
        <h1 class="calendar-title">Adventkalender</h1>
        <p class="calendar-subtitle">24 Türchen voller Liebe</p>
      </header>

      <!-- Calendar grid -->
      <ul id="adventDoors"></ul>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalDay">
      <div class="modal-sheet" id="modalSheet">
        <div class="modal-handle"></div>
        <p class="modal-day" id="modalDay"></p>
        <p class="modal-text" id="modalText"></p>
        <button class="modal-close" id="modalClose" aria-label="Schließen">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Schließen
        </button>
      </div>
    </div>

    <script src="messages.js"></script>
    <script src="calendar.js"></script>
  </body>
</html>
